<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 228 56" width="228" height="56" role="img" aria-label="Bueno Studio">
  <!-- Full logo — optimized for document headers on white background -->

  <!-- Indigo square with B mark — 52×52 -->
  <rect x="0" y="2" width="52" height="52" rx="11" fill="#6366F1"/>
  <g stroke="white" stroke-linecap="round" fill="none">
    <line x1="15" y1="13" x2="15" y2="43" stroke-width="6.5"/>
    <path d="M 15,13 Q 33,13 33,21 Q 33,29 15,29" stroke-width="5.5"/>
    <path d="M 15,27 Q 37,27 37,35 Q 37,43 15,43" stroke-width="5.5"/>
  </g>

  <!-- Wordmark -->
  <text x="66" y="29" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="19" font-weight="800" fill="#0F172A" letter-spacing="-0.4">Bueno</text>
  <text x="67" y="43" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="10.5" font-weight="500" fill="#64748B" letter-spacing="3">STUDIO</text>
